framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    # The app runs behind a local nginx reverse proxy (private network), which
    # forwards the real scheme/host and the URL prefix.
    trusted_proxies: 'private_ranges'
    trusted_headers:
        - 'x-forwarded-for'
        - 'x-forwarded-host'
        - 'x-forwarded-proto'
        - 'x-forwarded-port'
        - 'x-forwarded-prefix'

    php_errors:
        log: true

    validation:
        enable_attributes: true

    serializer:
        enable_attributes: true
